<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭记账系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00ffff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .stat-card .label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-card .value {
            font-size: 2.2rem;
            font-weight: bold;
        }

        .stat-card.balance .value {
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .stat-card.income .value {
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .stat-card.expense .value {
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #00ffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #00ffff, #0088ff);
            border-radius: 2px;
        }

        #chart-container {
            height: 300px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ffff, #0088ff);
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 255, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.4);
        }

        .import-export-card {
            margin-bottom: 20px;
        }

        .import-export-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .help-text {
            font-size: 0.85rem;
            color: #666;
            margin-top: 10px;
        }

        .btn-sm {
            padding: 6px 15px;
            font-size: 0.8rem;
            margin-right: 5px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
        }

        th {
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        tr:hover {
            background: rgba(0, 255, 255, 0.05);
        }

        .type-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .type-badge.income {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .type-badge.expense {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 255, 0.1);
        }

        .modal-title {
            font-size: 1.5rem;
            color: #00ffff;
            margin-bottom: 20px;
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: #aaa;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 600;
            z-index: 2000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
        }

        .toast.error {
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>家庭记账系统</h1>
            <p style="color: #666;">记录每一笔收支，掌控您的财务</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card balance">
                <div class="label">总余额</div>
                <div class="value" id="balance">¥ 0.00</div>
            </div>
            <div class="stat-card income">
                <div class="label">总收入</div>
                <div class="value" id="total-income">¥ 0.00</div>
            </div>
            <div class="stat-card expense">
                <div class="label">总支出</div>
                <div class="value" id="total-expense">¥ 0.00</div>
            </div>
        </div>

        <!-- 导入导出操作区 -->
        <div class="card import-export-card">
            <h3 class="card-title">数据管理</h3>
            <div class="import-export-buttons">
                <button class="btn btn-secondary" onclick="exportData()">
                    <i>📥</i> 导出数据
                </button>
                <button class="btn btn-secondary" onclick="openImportModal()">
                    <i>📤</i> 导入数据
                </button>
                <button class="btn btn-outline" onclick="downloadTemplate()">
                    <i>📄</i> 下载模板
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h3 class="card-title">支出分类统计</h3>
                <div id="chart-container">
                    <canvas id="expense-chart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3 class="card-title">添加记录</h3>
                <form id="transaction-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="date">日期</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label for="type">类型</label>
                            <select id="type" required>
                                <option value="income">收入</option>
                                <option value="expense">支出</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="category">分类</label>
                            <select id="category" required>
                                <option value="餐饮">餐饮</option>
                                <option value="购物">购物</option>
                                <option value="交通">交通</option>
                                <option value="工资">工资</option>
                                <option value="娱乐">娱乐</option>
                                <option value="医疗">医疗</option>
                                <option value="教育">教育</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="amount">金额</label>
                            <input type="number" id="amount" step="0.01" min="0" required placeholder="0.00">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="description">描述</label>
                        <textarea id="description" rows="3" placeholder="添加备注描述..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">添加记录</button>
                </form>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">交易流水</h3>
            <div class="table-container">
                <table id="transactions-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>分类</th>
                            <th>描述</th>
                            <th>金额</th>
                            <th>类型</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body">
                        <tr>
                            <td colspan="6" class="empty-state">
                                <i>暂无记录</i>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal" style="position: relative;">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <h3 class="modal-title">编辑记录</h3>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-date">日期</label>
                        <input type="date" id="edit-date" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-type">类型</label>
                        <select id="edit-type" required>
                            <option value="income">收入</option>
                            <option value="expense">支出</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-category">分类</label>
                        <select id="edit-category" required>
                            <option value="餐饮">餐饮</option>
                            <option value="购物">购物</option>
                            <option value="交通">交通</option>
                            <option value="工资">工资</option>
                            <option value="娱乐">娱乐</option>
                            <option value="医疗">医疗</option>
                            <option value="教育">教育</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-amount">金额</label>
                        <input type="number" id="edit-amount" step="0.01" min="0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit-description">描述</label>
                    <textarea id="edit-description" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">保存修改</button>
            </form>
        </div>
    </div>

    <!-- 导入模态框 -->
    <div class="modal-overlay" id="import-modal">
        <div class="modal" style="position: relative;">
            <button class="close-btn" onclick="closeImportModal()">&times;</button>
            <h3 class="modal-title">导入数据</h3>
            <form id="import-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="import-file">选择 CSV 文件</label>
                    <input type="file" id="import-file" accept=".csv" required>
                    <p class="help-text">请先下载模板，按照模板格式填写数据后再导入</p>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">开始导入</button>
            </form>
        </div>
    </div>

    <!-- Toast 消息提示 -->
    <div class="toast" id="toast"></div>

    <script>
        let chart = null;

        // 初始化日期为今天
        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        // 从交易数据计算统计信息
        function calculateStatistics(transactions) {
            const total_income = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const total_expense = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const balance = total_income - total_expense;
            
            const expense_by_category = {};
            transactions.filter(t => t.type === 'expense').forEach(t => {
                expense_by_category[t.category] = (expense_by_category[t.category] || 0) + t.amount;
            });
            
            const categories = Object.keys(expense_by_category);
            const amounts = Object.values(expense_by_category);
            
            return { total_income, total_expense, balance, categories, amounts };
        }

        // 更新统计显示
        function updateStatistics(transactions) {
            const stats = calculateStatistics(transactions);
            document.getElementById('balance').textContent = '¥ ' + stats.balance.toFixed(2);
            document.getElementById('total-income').textContent = '¥ ' + stats.total_income.toFixed(2);
            document.getElementById('total-expense').textContent = '¥ ' + stats.total_expense.toFixed(2);
            updateChart(stats.categories, stats.amounts);
        }

        // 获取交易列表
        async function fetchTransactions() {
            const response = await fetch('/api/transactions');
            const data = await response.json();
            if (data.success) {
                renderTransactions(data.data);
                updateStatistics(data.data);
            }
        }

        // 更新图表
        function updateChart(categories, amounts) {
            const ctx = document.getElementById('expense-chart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }

            const colors = [
                'rgba(0, 255, 255, 0.8)',
                'rgba(0, 255, 136, 0.8)',
                'rgba(255, 107, 107, 0.8)',
                'rgba(255, 230, 0, 0.8)',
                'rgba(155, 89, 182, 0.8)',
                'rgba(52, 152, 219, 0.8)',
                'rgba(231, 76, 60, 0.8)',
                'rgba(46, 204, 113, 0.8)'
            ];

            chart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: categories,
                    datasets: [{
                        data: amounts,
                        backgroundColor: colors.slice(0, categories.length),
                        borderColor: 'rgba(0, 255, 255, 0.3)',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#e0e0e0',
                                padding: 20,
                                font: {
                                    size: 12
                                }
                            }
                        }
                    }
                }
            });
        }

        // 渲染交易列表
        function renderTransactions(transactions) {
            const tbody = document.getElementById('transactions-body');
            
            if (transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><i>暂无记录</i></td></tr>';
                return;
            }

            tbody.innerHTML = transactions.map(t => `
                <tr>
                    <td>${t.date}</td>
                    <td>${t.category}</td>
                    <td>${t.description || '-'}</td>
                    <td>${t.type === 'income' ? '+' : '-'}¥ ${t.amount.toFixed(2)}</td>
                    <td><span class="type-badge ${t.type}">${t.type === 'income' ? '收入' : '支出'}</span></td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="editTransaction(${t.id})">编辑</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteTransaction(${t.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 添加记录
        document.getElementById('transaction-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                category: document.getElementById('category').value,
                amount: parseFloat(document.getElementById('amount').value),
                description: document.getElementById('description').value
            };

            const response = await fetch('/api/transactions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            showToast(result.success, result.message);
            
            if (result.success) {
                document.getElementById('transaction-form').reset();
                document.getElementById('date').value = new Date().toISOString().split('T')[0];
                await fetchTransactions();
            }
        });

        // 编辑记录
        async function editTransaction(id) {
            const response = await fetch('/api/transactions');
            const data = await response.json();
            
            if (data.success) {
                const transaction = data.data.find(t => t.id === id);
                if (transaction) {
                    document.getElementById('edit-id').value = transaction.id;
                    document.getElementById('edit-date').value = transaction.date;
                    document.getElementById('edit-type').value = transaction.type;
                    document.getElementById('edit-category').value = transaction.category;
                    document.getElementById('edit-amount').value = transaction.amount;
                    document.getElementById('edit-description').value = transaction.description;
                    document.getElementById('edit-modal').classList.add('active');
                }
            }
        }

        // 保存编辑
        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('edit-id').value;
            const data = {
                date: document.getElementById('edit-date').value,
                type: document.getElementById('edit-type').value,
                category: document.getElementById('edit-category').value,
                amount: parseFloat(document.getElementById('edit-amount').value),
                description: document.getElementById('edit-description').value
            };

            const response = await fetch(`/api/transactions/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            showToast(result.success, result.message);
            
            if (result.success) {
                closeModal();
                await fetchTransactions();
            }
        });

        // 删除记录
        async function deleteTransaction(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            const response = await fetch(`/api/transactions/${id}`, {
                method: 'DELETE'
            });

            const result = await response.json();
            showToast(result.success, result.message);
            
            if (result.success) {
                await fetchTransactions();
            }
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('edit-modal').classList.remove('active');
            document.getElementById('edit-form').reset();
        }

        // 显示提示消息
        function showToast(success, message) {
            const toast = document.getElementById('toast');
            toast.className = `toast ${success ? 'success' : 'error'} show`;
            toast.textContent = message;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 导出数据
        async function exportData() {
            try {
                const response = await fetch('/api/export');
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `transactions_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                showToast(true, '数据导出成功');
            } catch (error) {
                showToast(false, '导出失败：' + error.message);
            }
        }

        // 打开导入模态框
        function openImportModal() {
            document.getElementById('import-modal').classList.add('active');
            document.getElementById('import-form').reset();
        }

        // 关闭导入模态框
        function closeImportModal() {
            document.getElementById('import-modal').classList.remove('active');
        }

        // 下载模板
        async function downloadTemplate() {
            try {
                const response = await fetch('/api/import/template');
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'import_template.csv';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                showToast(true, '模板下载成功');
            } catch (error) {
                showToast(false, '下载失败：' + error.message);
            }
        }

        // 导入数据
        document.getElementById('import-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = document.getElementById('import-file').files[0];
            if (!file) {
                showToast(false, '请选择要导入的文件');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch('/api/import', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            showToast(result.success, result.message);
            
            if (result.success) {
                closeImportModal();
                await fetchTransactions();
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            fetchTransactions();
        });
    </script>
</body>
</html>
